{% load static %}

<style>
    .cabecalho {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 1.5rem;
    }

    .cabecalho__busca {
        justify-self: end;
        width: min(540px, 100%);
    }

    .menu-toggle {
        display: none;
    }

    .menu-overlay {
        display: none;
    }

    .alertas-topo {
        width: 100%;
        margin: 1rem 0;
    }

    @media (max-width: 768px) {
        .cabecalho {
            grid-template-columns: auto auto;
        }

        .menu-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            justify-self: end;
            width: 44px;
            height: 44px;
            background: #ffffff;
            color: #041833;
            border: 0;
            border-radius: 8px;
            font-size: 1.7rem;
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            z-index: 1001;
        }

        .cabecalho__busca {
            grid-column: 1 / -1;
            justify-self: stretch;
            width: 100%;
        }

        .menu-lateral {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            max-width: 85vw;
            height: 100vh;
            background-color: #041A37;
            padding: 2rem 1rem;
            transform: translateX(-100%);
            transition: transform .3s ease;
            z-index: 1000;
            box-shadow: 10px 0 30px rgba(0, 0, 0, .35);
        }

        body.menu-aberto .menu-lateral {
            transform: translateX(0);
        }

        .menu-lateral__navegacao {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .menu-lateral__navegacao a {
            margin-bottom: 0;
            font-size: 18px;
        }

        .menu-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, .45);
            z-index: 999;
        }

        body.menu-aberto .menu-overlay {
            display: block;
        }
    }
</style>

<div class="pagina-inicial">
    <header class="cabecalho">
        <img src="{% static 'assets/imagens/bannerMenor.png' %}" alt="Logo da Alura Space" />

        <button
            class="menu-toggle"
            type="button"
            aria-label="Abrir menu"
            onclick="document.body.classList.toggle('menu-aberto')"
        >
            ☰
        </button>

        <div class="menu-overlay" onclick="document.body.classList.remove('menu-aberto')"></div>

        <div class="cabecalho__busca">
            <div class="busca__fundo">
                <form action="{% url 'buscar' %}">
                    <input class="busca__input" type="text" name="buscar" placeholder="O que você procura?">
                </form>
            </div>
        </div>
    </header>

    <div class="alertas-topo">
        {% include 'partials/_alertas.html' %}
    </div>

    <main class="principal">
        <section class="menu-lateral">
            <nav class="menu-lateral__navegacao">
                <a href="{% url 'index' %}">
                    <img src="{% static 'assets/ícones/1x/Home - inativo.png' %}"> Home
                </a>
                <a href="{% url 'login' %}">
                    <img src="{% static 'assets/ícones/1x/Mais vistas - inativo.png' %}"> Login
                </a>
                <a href="{% url 'cadastro' %}">
                    <img src="{% static 'assets/ícones/1x/Novas - inativo.png' %}"> Cadastro
                </a>
                <a href="{% url 'nova_imagem' %}">
                    <img src="{% static 'assets/ícones/1x/new.png' %}"> Nova ação
                </a>
                <a href="{% url 'logout' %}">
                    <img src="{% static 'assets/ícones/1x/Surpreenda-me - inativo.png' %}"> Logout
                </a>
            </nav>
        </section>
