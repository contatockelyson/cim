{% extends 'shared/base.html' %}
{% load static %}

{% block content %}

<section class="galeria formulario-login">
    <form action="{% url 'login' %}" method="POST" class="formulario">
        {% csrf_token %}

        {% for field in form.visible_fields %}
            <div class="campo-form">
                <label for="{{ field.id_for_label }}">
                    {{ field.label }}
                </label>

                {{ field }}
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-success botao-form">
            Logar
        </button>
    </form>
</section>

{% endblock %}
